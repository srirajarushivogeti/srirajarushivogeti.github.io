backend:
  name: git-gateway
  branch: main

publish_mode: simple

media_folder: public/images/cms
public_folder: /images/cms

locale: en

site_url: https://mangkualaman.netlify.app
display_url: https://mangkualaman.netlify.app
logo_url: https://mangkualaman.netlify.app/og-image.jpg

collections:
  - name: berita
    label: "Berita / News Articles"
    label_singular: "Artikel"
    folder: src/content/berita
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{titleId}} ({{date}})"
    sortable_fields: ["date", "order", "categoryId"]
    fields:
      - { label: "Judul (Indonesia)",    name: titleId,    widget: string }
      - { label: "Title (English)",      name: titleEn,    widget: string }
      - { label: "Tanggal (Indonesia)",  name: date,       widget: string, hint: "Contoh: 15 Maret 2024" }
      - { label: "Date (English)",       name: dateEn,     widget: string, hint: "Example: 15 March 2024" }
      - { label: "Kategori (Indonesia)", name: categoryId, widget: string }
      - { label: "Category (English)",   name: categoryEn, widget: string }
      - { label: "Ringkasan (Indonesia)", name: excerptId, widget: text }
      - { label: "Excerpt (English)",    name: excerptEn,  widget: text }
      - { label: "Urutan Tampil",        name: order,      widget: number, value_type: int, required: false }
      - { label: "Artikel Unggulan",     name: featured,   widget: boolean, default: false }
      - { label: "Khusus Anggota Aliansi", name: alliance, widget: boolean, default: false,
          hint: "Jika aktif, artikel ini hanya terlihat oleh anggota aliansi yang sudah login." }
      - { label: "Isi Artikel (Indonesia)", name: body,    widget: markdown, required: false,
          hint: "Opsional — isi lengkap artikel dalam Bahasa Indonesia." }

  - name: gelar
    label: "Daftar Gelar / Title Registry"
    label_singular: "Gelar"
    folder: src/content/gelar
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{name}}"
    summary: "{{name}} — {{titleCode}}"
    fields:
      - { label: "Nama Penerima",           name: name,        widget: string }
      - { label: "Kode Gelar",              name: titleCode,   widget: string, hint: "Contoh: KRT, KRTH, KP" }
      - { label: "Gelar Lengkap (Indonesia)", name: titleFullId, widget: string }
      - { label: "Full Title (English)",    name: titleFullEn, widget: string }
      - { label: "Alasan Pemberian (Indonesia)", name: reasonId, widget: text }
      - { label: "Reason Awarded (English)", name: reasonEn,   widget: text }
      - { label: "Tanggal Diberikan",       name: dateAwarded, widget: string }
      - label: "Kategori"
        name: category
        widget: select
        options:
          - label: "Gelar Kebangsawanan - Nobility"
            value: kebangsawanan
          - label: "Gelar Penghargaan - Service Award"
            value: penghargaan
          - label: "Gelar Kehormatan - Honorary"
            value: kehormatan

  - name: sekutu
    label: "Sekutu / Alliances"
    label_singular: "Sekutu"
    folder: src/content/sekutu
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{nameEn}}"
    summary: "{{nameEn}} ({{regionEn}})"
    sortable_fields: ["order", "nameEn"]
    fields:
      - { label: "Nama Kerajaan (Indonesia)", name: nameId, widget: string }
      - { label: "Kingdom Name (English)",    name: nameEn, widget: string }
      - { label: "Wilayah / Lokasi (Indonesia)", name: regionId, widget: string, hint: "Contoh: Surakarta, Jawa Tengah, Indonesia" }
      - { label: "Region / Location (English)",   name: regionEn, widget: string }
      - { label: "Lintang / Latitude",  name: lat, widget: number, value_type: float, hint: "Garis lintang lokasi. Contoh: -7.575 (negatif = selatan khatulistiwa)." }
      - { label: "Bujur / Longitude",   name: lng, widget: number, value_type: float, hint: "Garis bujur lokasi. Contoh: 110.825 (positif = timur Greenwich)." }
      - { label: "Jenis Hubungan (Indonesia)", name: relationId, widget: string, hint: "Contoh: Anggota Jaringan MATRA" }
      - { label: "Relationship (English)",      name: relationEn, widget: string }
      - { label: "Deskripsi (Indonesia)", name: descId, widget: text }
      - { label: "Description (English)",  name: descEn, widget: text }
      - { label: "Tahun Berdiri",  name: established, widget: string, required: false }
      - label: "Tingkat Tampil di Peta / Map Reveal Tier"
        name: tier
        widget: select
        default: 1
        hint: "1 = selalu tampak. 2 = tampak saat zoom sedang. 3 = tampak saat zoom penuh. (1 = always visible; 2 reveals at medium zoom; 3 at full zoom.)"
        options:
          - { label: "Tingkat 1 — Selalu tampak / Always", value: 1 }
          - { label: "Tingkat 2 — Zoom sedang / Medium zoom", value: 2 }
          - { label: "Tingkat 3 — Zoom penuh / Full zoom", value: 3 }
      - { label: "Urutan Tampil",  name: order, widget: number, value_type: int, required: false }
      - { label: "Aktif",          name: active, widget: boolean, default: true,
          hint: "Jika nonaktif, sekutu ini tidak ditampilkan di peta." }

  - name: pusaka
    label: "Pusaka / Royal Heirlooms"
    label_singular: "Pusaka"
    folder: src/content/pusaka
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{nameEn}}"
    summary: "{{nameId}} — {{type}}"
    sortable_fields: ["order", "nameId", "type"]
    fields:
      - { label: "Nama Pusaka (Indonesia)", name: nameId, widget: string }
      - { label: "Heirloom Name (English)", name: nameEn, widget: string }
      - label: "Jenis Pusaka / Type"
        name: type
        widget: select
        default: keris
        options:
          - { label: "Keris", value: keris }
          - { label: "Tombak / Spear", value: tombak }
          - { label: "Payung Kebesaran / Ceremonial Umbrella", value: payung }
          - { label: "Naskah / Manuscript", value: naskah }
          - { label: "Regalia", value: regalia }
          - { label: "Lainnya / Other", value: lainnya }
      - { label: "Era / Periode", name: era, widget: string, required: false,
          hint: "Contoh: Abad ke-19 / 19th century. Kosongkan jika tidak diketahui." }
      - { label: "Asal-usul / Provenance (Indonesia)", name: originId, widget: string, required: false }
      - { label: "Provenance (English)", name: originEn, widget: string, required: false }
      - { label: "Deskripsi (Indonesia)", name: descId, widget: text }
      - { label: "Description (English)", name: descEn, widget: text }
      - { label: "Foto Pusaka", name: image, widget: image, required: false,
          hint: "Unggah foto pusaka. Jika kosong, ditampilkan ornamen pengganti." }
      - { label: "Urutan Tampil", name: order, widget: number, value_type: int, required: false }
      - { label: "Pusaka Unggulan", name: featured, widget: boolean, default: false }

  - name: linimasa
    label: "Linimasa / Dynasty Timeline"
    label_singular: "Tonggak Sejarah"
    folder: src/content/linimasa
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{order}}-{{titleEn}}"
    summary: "{{yearLabel}} — {{titleId}}"
    sortable_fields: ["order", "yearLabel"]
    fields:
      - { label: "Penanda Tahun / Year Label", name: yearLabel, widget: string,
          hint: "Contoh: 1813, 28 Jul 2017, atau 'Masa Depan / The Future'." }
      - { label: "Judul (Indonesia)", name: titleId, widget: string }
      - { label: "Title (English)",   name: titleEn, widget: string }
      - { label: "Deskripsi (Indonesia)", name: descId, widget: text }
      - { label: "Description (English)",  name: descEn, widget: text }
      - { label: "Era / Babak (Indonesia)", name: eraId, widget: string, required: false,
          hint: "Pengelompokan opsional. Contoh: Akar Pakualaman, Era Mangkualaman, Masa Depan." }
      - { label: "Era / Chapter (English)", name: eraEn, widget: string, required: false }
      - { label: "Urutan Kronologis", name: order, widget: number, value_type: int,
          hint: "Urutan tampil di garis waktu, dari kecil ke besar." }
      - { label: "Tonggak Utama / Major Milestone", name: major, widget: boolean, default: false,
          hint: "Jika aktif, ditampilkan lebih menonjol (emas)." }
      - { label: "Peristiwa Masa Depan / Future Event", name: future, widget: boolean, default: false,
          hint: "Jika aktif, ditampilkan sebagai peristiwa yang akan datang." }

  - name: silsilah
    label: "Silsilah / Family Tree"
    label_singular: "Anggota Silsilah"
    folder: src/content/silsilah
    extension: json
    format: json
    create: true
    delete: true
    identifier_field: name
    slug: "{{name}}"
    summary: "{{name}} ({{years}})"
    sortable_fields: ["order", "name"]
    fields:
      - { label: "Nama", name: name, widget: string }
      - { label: "Gelar / Peran (Indonesia)", name: titleId, widget: string, required: false }
      - { label: "Title / Role (English)",     name: titleEn, widget: string, required: false }
      - { label: "ID Induk / Parent ID", name: parentId, widget: string, required: false,
          hint: "Nama berkas (tanpa .json) dari anggota induk, mis. 'paku-alam-viii'. Kosongkan untuk akar pohon." }
      - { label: "Hubungan ke Induk (Indonesia)", name: relationId, widget: string, required: false,
          hint: "Mis: Putra, Menantu, Cucu." }
      - { label: "Relationship to Parent (English)", name: relationEn, widget: string, required: false }
      - { label: "Tahun / Years", name: years, widget: string, required: false, hint: "Mis: 2020 – 2022" }
      - label: "Cabang / Branch"
        name: branch
        widget: select
        default: mangkualaman
        options:
          - { label: "Mangkualaman", value: mangkualaman }
          - { label: "Pakualaman (konteks)", value: pakualaman }
          - { label: "Leluhur Bersama / Shared Ancestor", value: ancestor }
      - { label: "Penguasa Saat Ini / Current Ruler", name: current, widget: boolean, default: false }
      - { label: "Pewaris Masa Depan / Future Heir", name: future, widget: boolean, default: false }
      - { label: "Biografi Singkat (Indonesia)", name: bioId, widget: text, required: false }
      - { label: "Short Biography (English)",     name: bioEn, widget: text, required: false }
      - { label: "Tautan Halaman / Page Link", name: href, widget: string, required: false,
          hint: "Opsional, mis: /warisan#sri-paduka" }
      - { label: "Urutan antar Saudara / Sibling Order", name: order, widget: number, value_type: int, default: 0 }
